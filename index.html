<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Course Landing Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background-color: #000000;
            text-align: center;
            padding: 30px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Header Styling */
        .header-title {
            color: #34b3e4;
            font-size: 22px;
            font-weight: bold;
            line-height: 1.4;
            margin-bottom: 25px;
        }

        /* Profile Image Styling */
        .profile-container {
            width: 200px;
            height: 200px;
            margin: 0 auto 15px;
            border-radius: 50%;
            overflow: hidden;
            background: linear-gradient(45deg, #a8329b, #324fa8);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        hr {
            border: 0;
            height: 1px;
            background: #333;
            margin: 20px 0;
        }

        /* Features List Styling */
        .features-list {
            text-align: left;
            display: inline-block;
            margin-bottom: 25px;
        }

        .feature-item {
            color: #76ff03;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }

        .feature-item span {
            margin-right: 10px;
            font-size: 22px;
        }

        /* Buttons Styling */
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            cursor: pointer;
            text-decoration: none;
            background: linear-gradient(to right, #9c27b0, #00bcd4);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.02);
        }

        /* Timer Styling */
        .timer-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }

        .timer-box {
            text-align: center;
        }

        .timer-num {
            color: #ff0000;
            font-size: 24px;
            font-weight: bold;
            font-family: monospace;
        }

        .timer-label {
            color: #8b0000;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .timer-colon {
            color: #ff0000;
            font-size: 24px;
            font-weight: bold;
            align-self: flex-start;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header Text -->
        <div class="header-title">
            Learn Before You Trade<br>Smart Traders Keep Learning
        </div>

        <!-- Profile Section -->
        <div class="profile-container">
            <!-- Aap yahan apni image lagane ke liye src badal sakte hain -->
            <img src="https://i.ibb.co/FLPgSBHk/Tu-Q5o-VVl-Wgq-Es-Mq8s-R-2hrw6z-4-CQym-G1-ALaj-CU5jp-Ww-YLd4g618x-YBA7o68d-Oy-XHCSPC6ja-Synh-Uu-Pj-R3-W.jpg" alt="Purab Darda ( SEBI REGISTERED )">
        </div>
        <div class="profile-name">Purab Darda ( SEBI REGISTERED )</div>

        <hr>

        <!-- Features Bullet Points -->
        <div class="features-list">
            <div class="feature-item"><span>✔</span> Market Basics</div>
            <div class="feature-item"><span>✔</span> Chart Reading</div>
            <div class="feature-item"><span>✔</span> Trend Analysis</div>
            <div class="feature-item"><span>✔</span> Educational Discussions</div>
        </div>

        <hr>

        <!-- CTA Buttons -->
        <a href="https://t.me/+Z7bTtxu4N4ZhNThl" class="btn">JOIN TELEGRAMM GROUPS</a>
        <a href="https://t.me/+Z7bTtxu4N4ZhNThl
            " class="btn">JOIN TELEGRAMM GROUPS</a>

        <!-- Countdown Timer -->
        <div class="timer-container">
            <div class="timer-box">
                <div class="timer-num" id="days">00</div>
                <div class="timer-label">Days</div>
            </div>
            <div class="timer-colon">:</div>
            <div class="timer-box">
                <div class="timer-num" id="hours">00</div>
                <div class="timer-label">Hours</div>
            </div>
            <div class="timer-colon">:</div>
            <div class="timer-box">
                <div class="timer-num" id="minutes">00</div>
                <div class="timer-label">Minutes</div>
            </div>
            <div class="timer-colon">:</div>
            <div class="timer-box">
                <div class="timer-num" id="seconds">24</div>
                <div class="timer-label">Seconds</div>
            </div>
        </div>
    </div>

    <!-- JavaScript for 24-Second Loop Timer -->
    <script>
        let timeLeft = 24;
        const secondsElement = document.getElementById('seconds');

        setInterval(() => {
            if (timeLeft <= 0) {
                timeLeft = 24; // Timer khatam hone par wapas 24 se start hoga
            } else {
                timeLeft--;
            }
            secondsElement.innerText = timeLeft < 10 ? '0' + timeLeft : timeLeft;
        }, 1000);
    </script>

</body>
</html>
